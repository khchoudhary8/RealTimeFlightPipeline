name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'terraform/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'terraform/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock
        pip install mypy ruff pydantic
        pip install types-setuptools types-requests types-boto3
    
    - name: Lint with ruff
      run: |
        ruff check .
    
    - name: Type check with mypy
      run: |
        mypy --explicit-package-bases --ignore-missing-imports .
    
    - name: Test with pytest
      env:
        PYTHONPATH: .
      run: |
        python -m pytest tests/unit/ -v --cov=. --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        pip install bandit safety
        pip install -r requirements.txt
    
    - name: Security scan with bandit
      run: |
        bandit -r . -x tests,venv --format json --output bandit-report.json
      continue-on-error: true
    
    - name: Check dependencies with safety
      run: |
        safety check
      continue-on-error: true

  aws-ecr-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
      
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: flight-pipeline-app
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build main app image
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile.prod .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Build live-map-dashboard image (using same repo, different tag prefix)
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:live-map-$IMAGE_TAG ./live_map_app
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:live-map-$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:live-map-$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:live-map-latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:live-map-latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: aws-ecr-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          PROJECT_DIR="/home/ec2-user/flight_pipeline"
          cd $PROJECT_DIR
          
          echo "🔄 Pulling latest code from main..."
          git pull origin main
          
          echo "🔑 Logging into Amazon ECR..."
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ needs.aws-ecr-push.outputs.registry }}
          
          echo "🚀 Pulling and Restarting Containers..."
          export ECR_REGISTRY="${{ needs.aws-ecr-push.outputs.registry }}"
          export ECR_REPOSITORY="flight-pipeline-app"
          
          # Persist to .env for manual troubleshooting
          sed -i "s|ECR_REGISTRY=.*|ECR_REGISTRY=${ECR_REGISTRY}|" .env || echo "ECR_REGISTRY=${ECR_REGISTRY}" >> .env
          sed -i "s|ECR_REPOSITORY=.*|ECR_REPOSITORY=${ECR_REPOSITORY}|" .env || echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> .env
          
          docker compose pull
          docker compose up -d --remove-orphans
          
          echo "✅ Stateful Deployment Successful!"

    - name: Configure AWS credentials for ECS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Deploy Stateless Tier to ECS Fargate
      run: |
        echo "🚀 Triggering Rolling Update for Fargate Services..."
        aws ecs update-service --cluster flight-pipeline-cluster --service flight-pipeline-dashboard-svc --force-new-deployment
        aws ecs update-service --cluster flight-pipeline-cluster --service flight-pipeline-live-map-svc --force-new-deployment
        aws ecs update-service --cluster flight-pipeline-cluster --service flight-pipeline-streaming-svc --force-new-deployment
        aws ecs update-service --cluster flight-pipeline-cluster --service flight-pipeline-ingestion-svc --force-new-deployment
        echo "✅ ECS Deployment Triggered!"
