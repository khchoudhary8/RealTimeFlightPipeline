# Dagster Configuration
# See: https://docs.dagster.io/deployment/overview

# Define the repository
repository:
  module: dagster_app.defs
  attribute: defs

# Run launcher - how to execute jobs
run_launcher:
  module: dagster._core.launcher.default_run_launcher
  class: DefaultRunLauncher

# Storage backend - where to store metadata
storage:
  sqlite:
    base_dir: .dagster/storage

# Schedules & sensors run in the Dagster daemon
# Daemon process needs to be started separately
daemon:
  enabled: true

# Custom logging (optional)
logging:
  version: 1
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
  loggers:
    dagster:
      handlers: [console]
      level: INFO

# Telemetry (disable for privacy)
telemetry:
  enabled: false
